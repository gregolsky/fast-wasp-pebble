name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build pbw
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/pebble \
            -w /pebble \
            gregolsky/pebble-sdk:pebble-tool-5.0.37-sdk-4.9.169 \
            pebble build

      - name: Verify artifact
        run: ls -la build/*.pbw

      - name: Upload pbw artifact
        uses: actions/upload-artifact@v4
        with:
          name: fastwasp-pbw
          path: build/*.pbw
          if-no-files-found: error

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.pbw
          generate_release_notes: true
          draft: false
          prerelease: false
